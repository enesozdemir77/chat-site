<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat</title>

<!--
=======================================================
  SUPABASE ŞİFRE SİSTEMİ KURULUM TALİMATLARI
=======================================================

Supabase SQL Editor'da şunu çalıştır:

  -- Mesajlar tablosu (zaten varsa bu kısmı atla)
  create table if not exists messages (
    id uuid default gen_random_uuid() primary key,
    text text not null,
    username text not null,
    seen boolean default false,
    created_at timestamp with time zone default timezone('utc', now())
  );

  -- Şifre tablosu (YENİ)
  create table config (
    key text primary key,
    value text not null
  );

  -- Şifreyi buraya yaz (örnek: "gizlisifre123")
  insert into config (key, value) values ('chat_password', 'BURAYA_SİFRENİ_YAZ');

  -- RLS politikaları
  alter table messages enable row level security;
  alter table config enable row level security;

  create policy "Herkes mesaj okuyabilir" on messages for select using (true);
  create policy "Herkes mesaj yazabilir" on messages for insert with check (true);
  create policy "Herkes mesaj güncelleyebilir" on messages for update using (true);
  create policy "Herkes config okuyabilir" on config for select using (true);

Şifreyi değiştirmek istersen:
  update config set value = 'YENİ_ŞİFRE' where key = 'chat_password';

=======================================================
-->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f0f0;
    --surface: #ffffff;
    --bubble-out: #0084ff;
    --bubble-in: #e4e6eb;
    --text-out: #ffffff;
    --text-in: #111111;
    --muted: #8a8a8a;
    --border: #e0e0e0;
    --input-bg: #f7f7f7;
    --accent: #0084ff;
    --seen-color: #0084ff;
    --danger: #ef4444;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0e0e;
      --surface: #1c1c1e;
      --bubble-in: #2c2c2e;
      --text-in: #f2f2f7;
      --border: #2c2c2e;
      --input-bg: #2c2c2e;
      --muted: #8e8e93;
    }
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-in);
  }

  /* ── Ortak modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }

  .modal-box {
    background: var(--surface);
    border-radius: 20px;
    padding: 2rem 1.75rem;
    width: min(360px, 92vw);
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }

  .modal-icon { font-size: 2.2rem; margin-bottom: .6rem; }

  .modal-box h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: .35rem; }
  .modal-box p  { font-size: .88rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }

  .modal-box input {
    width: 100%; padding: .65rem 1rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 1rem; background: var(--input-bg); color: var(--text-in);
    outline: none; margin-bottom: .75rem; transition: border-color .15s;
  }

  .modal-box input:focus { border-color: var(--accent); }
  .modal-box input.error { border-color: var(--danger); }

  .modal-box .err-msg {
    font-size: .82rem; color: var(--danger);
    margin-bottom: .75rem; display: none;
  }

  .modal-box button.primary {
    width: 100%; padding: .72rem;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
    margin-bottom: .5rem;
  }

  .modal-box button.primary:hover { opacity: .88; }
  .modal-box button.primary:disabled { opacity: .5; cursor: not-allowed; }

  .skip-link {
    display: block; margin-top: .5rem;
    font-size: .84rem; color: var(--muted);
    cursor: pointer; text-decoration: underline;
  }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── App ── */
  #app {
    display: none; flex-direction: column;
    height: 100%; max-width: 680px;
    margin: 0 auto; background: var(--surface);
  }

  #header {
    display: flex; align-items: center; gap: .75rem;
    padding: .85rem 1rem; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 10;
  }

  #header-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: .95rem; flex-shrink: 0;
  }

  #header-info h1 { font-size: 1rem; font-weight: 600; line-height: 1.2; }
  #header-info span { font-size: .78rem; color: var(--muted); }

  #online-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e; display: inline-block; margin-right: 4px;
  }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 1rem .75rem;
    display: flex; flex-direction: column; gap: .25rem;
    scroll-behavior: smooth;
  }

  .msg-group { display: flex; flex-direction: column; max-width: 72%; gap: 2px; }
  .msg-group.out { align-self: flex-end; align-items: flex-end; }
  .msg-group.in  { align-self: flex-start; align-items: flex-start; }

  .msg-sender { font-size: .72rem; color: var(--muted); margin-bottom: 2px; padding: 0 4px; }

  .bubble {
    padding: .55rem .85rem; border-radius: 18px;
    font-size: .95rem; line-height: 1.45;
    max-width: 100%; word-break: break-word;
  }

  .out .bubble { background: var(--bubble-out); color: var(--text-out); border-bottom-right-radius: 4px; }
  .in .bubble  { background: var(--bubble-in);  color: var(--text-in);  border-bottom-left-radius: 4px; }

  .msg-meta { display: flex; align-items: center; gap: 5px; padding: 0 4px; margin-top: 2px; }
  .msg-time  { font-size: .68rem; color: var(--muted); }
  .seen-label { font-size: .68rem; color: var(--seen-color); font-weight: 500; }

  .msg-spacer { height: .6rem; }

  #input-bar {
    display: flex; align-items: center; gap: .5rem;
    padding: .65rem .75rem; border-top: 1px solid var(--border);
    background: var(--surface); position: sticky; bottom: 0;
  }

  #msg-input {
    flex: 1; padding: .6rem 1rem;
    border: 1.5px solid var(--border); border-radius: 22px;
    font-size: .95rem; background: var(--input-bg); color: var(--text-in);
    outline: none; resize: none; max-height: 120px;
    line-height: 1.4; transition: border-color .15s; font-family: inherit;
  }

  #msg-input:focus { border-color: var(--accent); }

  #send-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity .15s, transform .1s;
  }

  #send-btn:hover { opacity: .88; }
  #send-btn:active { transform: scale(.93); }
  #send-btn svg { width: 18px; height: 18px; fill: #fff; }

  #empty-state {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .5rem; flex: 1;
    color: var(--muted); font-size: .9rem;
    text-align: center; padding: 2rem;
  }

  #empty-state svg { width: 48px; height: 48px; opacity: .3; fill: var(--muted); margin-bottom: .5rem; }

  #error-banner {
    display: none; background: #fee2e2; color: #991b1b;
    font-size: .85rem; padding: .6rem 1rem;
    border-bottom: 1px solid #fca5a5; text-align: center;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 480px) { .msg-group { max-width: 85%; } }
</style>
</head>
<body>

<!-- ── ADIM 1: Şifre ekranı ── -->
<div class="modal-overlay" id="pw-screen">
  <div class="modal-box">
    <div class="modal-icon">🔒</div>
    <h2>Özel Sohbet</h2>
    <p>Bu sohbete katılmak için şifreyi gir.</p>
    <input id="pw-input" type="password" placeholder="Şifre…" autocomplete="off" />
    <div class="err-msg" id="pw-error">Şifre yanlış, tekrar dene.</div>
    <button class="primary" id="pw-btn">Giriş Yap</button>
  </div>
</div>

<!-- ── ADIM 2: Kullanıcı adı ekranı ── -->
<div class="modal-overlay" id="name-screen" style="display:none;">
  <div class="modal-box">
    <div class="modal-icon">💬</div>
    <h2>Merhaba!</h2>
    <p>Kullanıcı adı gir veya anonim olarak katıl.</p>
    <input id="username-input" type="text" placeholder="Kullanıcı adın…" maxlength="24" autocomplete="off" />
    <button class="primary" id="join-btn">Sohbete Katıl</button>
    <span class="skip-link" id="skip-btn">Anonim katıl</span>
  </div>
</div>

<!-- ── Ana uygulama ── -->
<div id="app">
  <div id="header">
    <div id="header-avatar">C</div>
    <div id="header-info">
      <h1>Group Chat</h1>
      <span><span id="online-dot"></span>Canlı</span>
    </div>
    <div style="margin-left:auto;font-size:.82rem;color:var(--muted)" id="current-user-label"></div>
  </div>

  <div id="error-banner"></div>

  <div id="messages">
    <div id="empty-state">
      <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
      Henüz mesaj yok. Merhaba de!
    </div>
  </div>

  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Mesaj…" maxlength="1000"></textarea>
    <button id="send-btn" title="Gönder">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://bycrjcuqefpjafuczknw.supabase.co";
const SUPABASE_KEY = "sb_publishable_1jvBq9F7H06KPHqRFa4Fqg_6C1SX_jH";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = "";
let allMessages = [];

// ── DOM ────────────────────────────────────────
const pwScreen       = document.getElementById("pw-screen");
const pwInput        = document.getElementById("pw-input");
const pwBtn          = document.getElementById("pw-btn");
const pwError        = document.getElementById("pw-error");
const nameScreen     = document.getElementById("name-screen");
const usernameInput  = document.getElementById("username-input");
const joinBtn        = document.getElementById("join-btn");
const skipBtn        = document.getElementById("skip-btn");
const appEl          = document.getElementById("app");
const messagesEl     = document.getElementById("messages");
const emptyState     = document.getElementById("empty-state");
const msgInput       = document.getElementById("msg-input");
const sendBtn        = document.getElementById("send-btn");
const headerAvatar   = document.getElementById("header-avatar");
const currentUserLbl = document.getElementById("current-user-label");
const errorBanner    = document.getElementById("error-banner");

// ── Yardımcı fonksiyonlar ──────────────────────
function formatTime(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function initials(name) {
  return name ? name.slice(0, 2).toUpperCase() : "?";
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = "block";
}

// ── ADIM 1: Şifre doğrulama ───────────────────
async function checkPassword() {
  const entered = pwInput.value.trim();
  if (!entered) return;

  // Butonu yükleme moduna al
  pwBtn.disabled = true;
  pwBtn.innerHTML = '<span class="spinner"></span>Kontrol ediliyor…';
  pwError.style.display = "none";
  pwInput.classList.remove("error");

  try {
    const { data, error } = await db
      .from("config")
      .select("value")
      .eq("key", "chat_password")
      .single();

    if (error) throw error;

    if (data.value === entered) {
      // Şifre doğru — kullanıcı adı ekranına geç
      sessionStorage.setItem("chat_auth", "ok");
      pwScreen.style.display = "none";
      nameScreen.style.display = "flex";
      setTimeout(() => usernameInput.focus(), 100);
    } else {
      // Şifre yanlış
      pwInput.classList.add("error");
      pwError.style.display = "block";
      pwInput.value = "";
      pwInput.focus();
    }
  } catch(e) {
    pwError.textContent = "Bağlantı hatası: " + e.message;
    pwError.style.display = "block";
  } finally {
    pwBtn.disabled = false;
    pwBtn.textContent = "Giriş Yap";
  }
}

pwBtn.addEventListener("click", checkPassword);
pwInput.addEventListener("keydown", e => { if (e.key === "Enter") checkPassword(); });

// Oturumda zaten şifre girilmişse direkt kullanıcı adı ekranına git
if (sessionStorage.getItem("chat_auth") === "ok") {
  pwScreen.style.display = "none";
  nameScreen.style.display = "flex";
}

// ── ADIM 2: Kullanıcı adı & sohbete giriş ─────
function enterChat(name) {
  currentUser = name || ("Misafir_" + Math.floor(Math.random() * 9000 + 1000));
  nameScreen.style.display = "none";
  appEl.style.display = "flex";
  headerAvatar.textContent = initials(currentUser);
  currentUserLbl.textContent = currentUser;
  loadMessages();
  subscribeRealtime();
}

joinBtn.addEventListener("click", () => enterChat(usernameInput.value.trim()));
skipBtn.addEventListener("click",  () => enterChat(""));
usernameInput.addEventListener("keydown", e => {
  if (e.key === "Enter") enterChat(usernameInput.value.trim());
});

// ── Mesajları yükle ────────────────────────────
async function loadMessages() {
  const { data, error } = await db
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) { showError("Mesajlar yüklenemedi: " + error.message); return; }

  allMessages = data || [];
  renderMessages(allMessages);
  scrollToBottom();
  await markSeenForOthers(allMessages);
}

// ── Gerçek zamanlı dinleyici ───────────────────
function subscribeRealtime() {
  db.channel("messages-channel")
    .on("postgres_changes",
      { event: "*", schema: "public", table: "messages" },
      payload => {
        if (payload.eventType === "INSERT") {
          allMessages.push(payload.new);
          renderMessages(allMessages);
          if (isAtBottom()) scrollToBottom();
          if (payload.new.username !== currentUser) markSeenForOthers([payload.new]);
        } else if (payload.eventType === "UPDATE") {
          const idx = allMessages.findIndex(m => m.id === payload.new.id);
          if (idx !== -1) allMessages[idx] = payload.new;
          renderMessages(allMessages);
        }
      }
    )
    .subscribe(status => {
      if (status === "CHANNEL_ERROR") showError("Bağlantı hatası. Sayfayı yenile.");
    });
}

// ── Görüldü işaretle ──────────────────────────
async function markSeenForOthers(msgs) {
  const ids = msgs.filter(m => m.username !== currentUser && !m.seen).map(m => m.id);
  if (!ids.length) return;
  await db.from("messages").update({ seen: true }).in("id", ids);
}

// ── Mesaj gönder ──────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = "";
  autoResize();

  const { error } = await db.from("messages").insert({
    text, username: currentUser, seen: false
  });

  if (error) showError("Gönderilemedi: " + error.message);
}

sendBtn.addEventListener("click", sendMessage);
msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
msgInput.addEventListener("input", autoResize);

function autoResize() {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
}

// ── Mesajları render et ───────────────────────
function renderMessages(messages) {
  if (!messages.length) { emptyState.style.display = "flex"; return; }
  emptyState.style.display = "none";

  const wasBottom = isAtBottom();
  messagesEl.innerHTML = "";
  let lastSender = null;

  messages.forEach((msg, i) => {
    const isOwn = msg.username === currentUser;
    const senderChanged = msg.username !== lastSender;

    if (senderChanged && i > 0) {
      const sp = document.createElement("div");
      sp.className = "msg-spacer";
      messagesEl.appendChild(sp);
    }

    const group = document.createElement("div");
    group.className = "msg-group " + (isOwn ? "out" : "in");

    if (senderChanged && !isOwn) {
      const s = document.createElement("div");
      s.className = "msg-sender";
      s.textContent = msg.username;
      group.appendChild(s);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = msg.text;
    group.appendChild(bubble);

    const meta = document.createElement("div");
    meta.className = "msg-meta";

    const timeEl = document.createElement("span");
    timeEl.className = "msg-time";
    timeEl.textContent = formatTime(msg.created_at);
    meta.appendChild(timeEl);

    if (isOwn && msg.seen) {
      const seenEl = document.createElement("span");
      seenEl.className = "seen-label";
      seenEl.textContent = "Görüldü";
      meta.appendChild(seenEl);
    }

    group.appendChild(meta);
    messagesEl.appendChild(group);
    lastSender = msg.username;
  });

  if (wasBottom) scrollToBottom();
}

function isAtBottom() {
  const { scrollTop, scrollHeight, clientHeight } = messagesEl;
  return scrollHeight - scrollTop - clientHeight < 80;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
</script>
</body>
</html>
