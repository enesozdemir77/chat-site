<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat</title>

<!--
=======================================================
  SUPABASE KURULUM TALİMATLARI
=======================================================

1. Supabase Dashboard → SQL Editor'a gir
2. Aşağıdaki SQL'i kopyala ve "Run" ile çalıştır:

  create table messages (
    id uuid default gen_random_uuid() primary key,
    text text not null,
    username text not null,
    seen boolean default false,
    created_at timestamp with time zone default timezone('utc', now())
  );

  alter table messages enable row level security;

  create policy "Herkes okuyabilir"
    on messages for select using (true);

  create policy "Herkes yazabilir"
    on messages for insert with check (true);

  create policy "Herkes güncelleyebilir"
    on messages for update using (true);

3. Sol menüden "Realtime" → "Tables" → messages tablosunu etkinleştir
4. Dosyayı GitHub Pages'e yükle ve linki paylaş!
=======================================================
-->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f0f0;
    --surface: #ffffff;
    --bubble-out: #0084ff;
    --bubble-in: #e4e6eb;
    --text-out: #ffffff;
    --text-in: #111111;
    --muted: #8a8a8a;
    --border: #e0e0e0;
    --input-bg: #f7f7f7;
    --accent: #0084ff;
    --seen-color: #0084ff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0e0e;
      --surface: #1c1c1e;
      --bubble-in: #2c2c2e;
      --text-in: #f2f2f7;
      --border: #2c2c2e;
      --input-bg: #2c2c2e;
      --muted: #8e8e93;
    }
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-in);
  }

  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  #modal {
    background: var(--surface);
    border-radius: 18px;
    padding: 2rem 1.75rem;
    width: min(360px, 90vw);
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  #modal h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: .4rem; }
  #modal p  { font-size: .9rem; color: var(--muted); margin-bottom: 1.25rem; }

  #modal input {
    width: 100%; padding: .65rem 1rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 1rem; background: var(--input-bg); color: var(--text-in);
    outline: none; margin-bottom: 1rem; transition: border-color .15s;
  }

  #modal input:focus { border-color: var(--accent); }

  #modal button {
    width: 100%; padding: .7rem;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }

  #modal button:hover { opacity: .88; }

  #modal .skip {
    display: block; margin-top: .75rem;
    font-size: .85rem; color: var(--muted);
    cursor: pointer; text-decoration: underline;
  }

  #app {
    display: none; flex-direction: column;
    height: 100%; max-width: 680px;
    margin: 0 auto; background: var(--surface);
  }

  #header {
    display: flex; align-items: center; gap: .75rem;
    padding: .85rem 1rem; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 10;
  }

  #header-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: .95rem; flex-shrink: 0;
  }

  #header-info h1 { font-size: 1rem; font-weight: 600; line-height: 1.2; }
  #header-info span { font-size: .78rem; color: var(--muted); }

  #online-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e; display: inline-block; margin-right: 4px;
  }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 1rem .75rem;
    display: flex; flex-direction: column; gap: .25rem;
    scroll-behavior: smooth;
  }

  .msg-group { display: flex; flex-direction: column; max-width: 72%; gap: 2px; }
  .msg-group.out { align-self: flex-end; align-items: flex-end; }
  .msg-group.in  { align-self: flex-start; align-items: flex-start; }

  .msg-sender { font-size: .72rem; color: var(--muted); margin-bottom: 2px; padding: 0 4px; }

  .bubble {
    padding: .55rem .85rem; border-radius: 18px;
    font-size: .95rem; line-height: 1.45;
    max-width: 100%; word-break: break-word;
  }

  .out .bubble { background: var(--bubble-out); color: var(--text-out); border-bottom-right-radius: 4px; }
  .in .bubble  { background: var(--bubble-in);  color: var(--text-in);  border-bottom-left-radius: 4px; }

  .msg-meta { display: flex; align-items: center; gap: 5px; padding: 0 4px; margin-top: 2px; }
  .msg-time  { font-size: .68rem; color: var(--muted); }
  .seen-label { font-size: .68rem; color: var(--seen-color); font-weight: 500; }

  .msg-spacer { height: .6rem; }

  #input-bar {
    display: flex; align-items: center; gap: .5rem;
    padding: .65rem .75rem; border-top: 1px solid var(--border);
    background: var(--surface); position: sticky; bottom: 0;
  }

  #msg-input {
    flex: 1; padding: .6rem 1rem;
    border: 1.5px solid var(--border); border-radius: 22px;
    font-size: .95rem; background: var(--input-bg); color: var(--text-in);
    outline: none; resize: none; max-height: 120px;
    line-height: 1.4; transition: border-color .15s; font-family: inherit;
  }

  #msg-input:focus { border-color: var(--accent); }

  #send-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity .15s, transform .1s;
  }

  #send-btn:hover { opacity: .88; }
  #send-btn:active { transform: scale(.93); }
  #send-btn svg { width: 18px; height: 18px; fill: #fff; }

  #empty-state {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .5rem; flex: 1;
    color: var(--muted); font-size: .9rem;
    text-align: center; padding: 2rem;
  }

  #empty-state svg { width: 48px; height: 48px; opacity: .35; fill: var(--muted); margin-bottom: .5rem; }

  #error-banner {
    display: none; background: #fee2e2; color: #991b1b;
    font-size: .85rem; padding: .6rem 1rem;
    border-bottom: 1px solid #fca5a5; text-align: center;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 480px) { .msg-group { max-width: 85%; } }
</style>
</head>
<body>

<div id="modal-overlay">
  <div id="modal">
    <div style="font-size:2rem;margin-bottom:.5rem;">💬</div>
    <h2>Welcome to Chat</h2>
    <p>Kullanıcı adı gir veya anonim katıl.</p>
    <input id="username-input" type="text" placeholder="Kullanıcı adın…" maxlength="24" autocomplete="off" />
    <button id="join-btn">Katıl</button>
    <span class="skip" id="skip-btn">Anonim katıl</span>
  </div>
</div>

<div id="app">
  <div id="header">
    <div id="header-avatar">C</div>
    <div id="header-info">
      <h1>Group Chat</h1>
      <span><span id="online-dot"></span>Canlı</span>
    </div>
    <div style="margin-left:auto;font-size:.82rem;color:var(--muted)" id="current-user-label"></div>
  </div>

  <div id="error-banner"></div>

  <div id="messages">
    <div id="empty-state">
      <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
      Henüz mesaj yok. Merhaba de!
    </div>
  </div>

  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Mesaj…" maxlength="1000"></textarea>
    <button id="send-btn" title="Gönder">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://bycrjcuqefpjafuczknw.supabase.co";
const SUPABASE_KEY = "sb_publishable_1jvBq9F7H06KPHqRFa4Fqg_6C1SX_jH";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = "";
let allMessages = [];

const modalOverlay   = document.getElementById("modal-overlay");
const usernameInput  = document.getElementById("username-input");
const joinBtn        = document.getElementById("join-btn");
const skipBtn        = document.getElementById("skip-btn");
const appEl          = document.getElementById("app");
const messagesEl     = document.getElementById("messages");
const emptyState     = document.getElementById("empty-state");
const msgInput       = document.getElementById("msg-input");
const sendBtn        = document.getElementById("send-btn");
const headerAvatar   = document.getElementById("header-avatar");
const currentUserLbl = document.getElementById("current-user-label");
const errorBanner    = document.getElementById("error-banner");

function formatTime(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function initials(name) {
  return name ? name.slice(0, 2).toUpperCase() : "?";
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = "block";
}

function enterChat(name) {
  currentUser = name || ("Misafir_" + Math.floor(Math.random() * 9000 + 1000));
  modalOverlay.style.display = "none";
  appEl.style.display = "flex";
  headerAvatar.textContent = initials(currentUser);
  currentUserLbl.textContent = currentUser;
  loadMessages();
  subscribeRealtime();
}

joinBtn.addEventListener("click", () => enterChat(usernameInput.value.trim()));
skipBtn.addEventListener("click",  () => enterChat(""));
usernameInput.addEventListener("keydown", e => {
  if (e.key === "Enter") enterChat(usernameInput.value.trim());
});

async function loadMessages() {
  const { data, error } = await db
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) { showError("Mesajlar yüklenemedi: " + error.message); return; }

  allMessages = data || [];
  renderMessages(allMessages);
  scrollToBottom();
  await markSeenForOthers(allMessages);
}

function subscribeRealtime() {
  db.channel("messages-channel")
    .on("postgres_changes",
      { event: "*", schema: "public", table: "messages" },
      payload => {
        if (payload.eventType === "INSERT") {
          allMessages.push(payload.new);
          renderMessages(allMessages);
          if (isAtBottom()) scrollToBottom();
          if (payload.new.username !== currentUser) {
            markSeenForOthers([payload.new]);
          }
        } else if (payload.eventType === "UPDATE") {
          const idx = allMessages.findIndex(m => m.id === payload.new.id);
          if (idx !== -1) allMessages[idx] = payload.new;
          renderMessages(allMessages);
        }
      }
    )
    .subscribe(status => {
      if (status === "CHANNEL_ERROR") showError("Bağlantı hatası. Sayfayı yenile.");
    });
}

async function markSeenForOthers(msgs) {
  const unseenIds = msgs
    .filter(m => m.username !== currentUser && !m.seen)
    .map(m => m.id);
  if (!unseenIds.length) return;
  await db.from("messages").update({ seen: true }).in("id", unseenIds);
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = "";
  autoResize();

  const { error } = await db.from("messages").insert({
    text,
    username: currentUser,
    seen: false
  });

  if (error) showError("Gönderilemedi: " + error.message);
}

sendBtn.addEventListener("click", sendMessage);

msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

msgInput.addEventListener("input", autoResize);

function autoResize() {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
}

function renderMessages(messages) {
  if (!messages.length) { emptyState.style.display = "flex"; return; }
  emptyState.style.display = "none";

  const wasBottom = isAtBottom();
  messagesEl.innerHTML = "";
  let lastSender = null;

  messages.forEach((msg, i) => {
    const isOwn = msg.username === currentUser;
    const senderChanged = msg.username !== lastSender;

    if (senderChanged && i > 0) {
      const spacer = document.createElement("div");
      spacer.className = "msg-spacer";
      messagesEl.appendChild(spacer);
    }

    const group = document.createElement("div");
    group.className = "msg-group " + (isOwn ? "out" : "in");

    if (senderChanged && !isOwn) {
      const s = document.createElement("div");
      s.className = "msg-sender";
      s.textContent = msg.username;
      group.appendChild(s);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = msg.text;
    group.appendChild(bubble);

    const meta = document.createElement("div");
    meta.className = "msg-meta";

    const timeEl = document.createElement("span");
    timeEl.className = "msg-time";
    timeEl.textContent = formatTime(msg.created_at);
    meta.appendChild(timeEl);

    if (isOwn && msg.seen) {
      const seenEl = document.createElement("span");
      seenEl.className = "seen-label";
      seenEl.textContent = "Görüldü";
      meta.appendChild(seenEl);
    }

    group.appendChild(meta);
    messagesEl.appendChild(group);
    lastSender = msg.username;
  });

  if (wasBottom) scrollToBottom();
}

function isAtBottom() {
  const { scrollTop, scrollHeight, clientHeight } = messagesEl;
  return scrollHeight - scrollTop - clientHeight < 80;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
</script>
</body>
</html>
